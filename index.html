<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    z-index:10;
    padding:20px;
    animation:fadeIn 2s;
}

h1{
    font-size:clamp(2.5rem,8vw,4.5rem);
    text-shadow:0 0 15px rgba(255,255,255,.7);
}

h2{
    font-size:clamp(1.4rem,5vw,2.2rem);
    margin:15px 0;
}

p{
    font-size:clamp(1rem,3vw,1.3rem);
    max-width:700px;
    margin:auto;
    line-height:1.6;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    color:white;
    background:#ff4081;
    box-shadow:0 0 20px #fff;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#ff0055;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Balloons */

.balloon{
    position:absolute;
    bottom:-200px;
    font-size:60px;
    animation:float linear infinite;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-130vh);
    }
}

canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="container">
<h1>🎉 Happy Birthday! 🎂</h1>

<h2>Wishing You Endless Happiness 💖</h2>

<p>
May your day be filled with love, laughter, beautiful memories,
and all the happiness you deserve.
May every dream come true and every moment bring joy.
Have a fantastic birthday! 🎁✨
</p>

<button onclick="celebrate()">🎈 Celebrate 🎈</button>
</div>

<script>
// Floating Balloons

const emojis=["🎈","🎉","🎁","💖","✨"];

for(let i=0;i<25;i++){

let b=document.createElement("div");
b.className="balloon";
b.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

b.style.left=Math.random()*100+"vw";
b.style.fontSize=(30+Math.random()*50)+"px";
b.style.animationDuration=(8+Math.random()*8)+"s";
b.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(b);

}


// Confetti Animation

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

let W,H;

function resize(){
W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;
}

window.addEventListener("resize",resize);
resize();

const confetti=[];

for(let i=0;i<250;i++){

confetti.push({
x:Math.random()*W,
y:Math.random()*H,
r:Math.random()*7+3,
d:Math.random()*250,
color:`hsl(${Math.random()*360},100%,50%)`,
tilt:Math.random()*10,
speed:Math.random()*3+2
});

}

function draw(){

ctx.clearRect(0,0,W,H);

confetti.forEach(c=>{

ctx.beginPath();
ctx.fillStyle=c.color;
ctx.fillRect(c.x,c.y,c.r,c.r);

});

update();

requestAnimationFrame(draw);

}

function update(){

confetti.forEach(c=>{

c.y+=c.speed;
c.x+=Math.sin(c.d);

if(c.y>H){
c.y=-20;
c.x=Math.random()*W;
}

});

}

draw();

function celebrate(){

for(let i=0;i<120;i++){

confetti.push({
x:Math.random()*W,
y:-20,
r:Math.random()*8+4,
d:Math.random()*300,
color:`hsl(${Math.random()*360},100%,50%)`,
speed:Math.random()*5+3
});

}

alert("🎂 Happy Birthday! Have an Amazing Year Ahead! 🎉");

}
</script>

</body>
</html>
